services:
  db:
    image: postgres:17-alpine
    container_name: smart_task_db
    restart: always
    environment:
      - POSTGRES_USER=smart_user
      - POSTGRES_PASSWORD=smart_pass
      - POSTGRES_DB=smart_task_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_smart_task.sql:/docker-entrypoint-initdb.d/init_smart_task.sql
    ports:
      - "5433:5432"

  smart_task_copilot:
    image: smart_task_copilot
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "45666:45666"
      - "9001:9001"
      - "9002:9002"
    container_name: smart_task_copilot
    depends_on:
      - db
    environment:
      - MCP_TRANSPORT=http
      - PORT=45666
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - SMART_WORKSPACE_ROOT=/workspaces
      - ARCHITECT_AGENT_URL=http://architect_agent:9011/a2a/architect/.well-known/agent-card.json
      - CODER_AGENT_URL=http://coder_agent:9012/a2a/coder/.well-known/agent-card.json
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PYTHONPATH=.
      - AGENT_BASE_PATH=/app
    volumes:
      - .:/app
      - /app/.venv
      - d:/MyProject:/workspaces 
    restart: on-failure

  architect_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SESSION_SERVICE_URI=postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9011", "--a2a", "--host", "0.0.0.0", "--session_service_uri", "postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub?options=-csearch_path%3Dadk", "--log_level", "DEBUG", "-v"]
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      - db
    ports:
      - "9011:9011"

  coder_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SMART_WORKSPACE_ROOT=/workspaces
      - SESSION_SERVICE_URI=postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9012", "--a2a", "--host", "0.0.0.0", "--session_service_uri", "postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub?options=-csearch_path%3Dadk"]
    ports:
      - "9012:9012"
    volumes:
      - .:/app
      - /app/.venv
      - d:/MyProject:/workspaces
    depends_on:
      - db

  researcher_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DEPARTMENT_NAME=Quant_Researcher
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9013", "--host", "0.0.0.0", "--log_level", "INFO"]
    ports:
      - "9013:9013"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/researcher:/workspaces
    depends_on:
      - db

  tester_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DEPARTMENT_NAME=QA_Tester
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9014", "--host", "0.0.0.0", "--log_level", "INFO"]
    ports:
      - "9014:9014"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/tester:/workspaces
    depends_on:
      - db

  trader_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DEPARTMENT_NAME=Execution_Trader
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9015", "--host", "0.0.0.0", "--log_level", "INFO"]
    ports:
      - "9015:9015"
    volumes:
      - .:/app
