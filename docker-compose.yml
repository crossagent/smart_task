  hub_pm:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart_task.git
      - AGENT_NAME=hub_pm
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=45666
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "45666:45666"
    command: ["adk", "web", "./", "--port", "45666"]
    depends_on:
