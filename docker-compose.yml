  risk_manager_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DEPARTMENT_NAME=Risk_Manager
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9017", "--host", "0.0.0.0", "--log_level", "INFO"]
    ports:
      - "9017:9017"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/risk:/workspaces
    depends_on:
      - db

  devops_agent:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DEPARTMENT_NAME=Infra_DevOps
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9018", "--host", "0.0.0.0", "--log_level", "INFO"]
    ports:
      - "9018:9018"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/devops:/workspaces
    depends_on:
      - db

volumes:
  postgres_data:
