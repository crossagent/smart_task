services:
  db:
    image: postgres:17-alpine
    container_name: smart_task_db
    restart: always
    environment:
      - POSTGRES_USER=smart_user
      - POSTGRES_PASSWORD=smart_pass
      - POSTGRES_DB=smart_task_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_user -d smart_task_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  smart_task_hub:
    build: 
      context: ./smart_task_hub
      dockerfile: Dockerfile
    container_name: smart_task_hub
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - ADK_A2A_SERVER_PORT=45666
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - MCP_TRANSPORT=streamable-http
      - PORT=45666
      - FASTMCP_HOST=0.0.0.0
    ports:
      - "45666:45666"
    volumes:
      - ./smart_task_hub:/app
      - /app/.venv
    command: ["uv", "run", "python", "server.py"]
    depends_on:
      db:
        condition: service_healthy

  data_engineer:
    build: 
      context: ./experts/data_engineer
      dockerfile: Dockerfile
    container_name: data_engineer
    environment:
      - AGENT_NAME=data_engineer
      - DB_HOST=db
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - ADK_A2A_SERVER_PORT=9013
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SKILLS_PATH=/app/skills/data_engineer_skill
    ports:
      - "9013:9013"
    volumes:
      - ./experts/data_engineer:/app
      - ./experts/data_engineer/skills:/app/skills
      - /app/.venv
    command: ["uv", "run", "adk", "api_server", "./", "--port", "9013", "--host", "0.0.0.0"]
    depends_on:
      db:
        condition: service_healthy
      smart_task_hub:
        condition: service_started

  dashboard:
    build:
      context: ./dashboard-server
      dockerfile: Dockerfile
    container_name: smart_task_dashboard
    restart: always
    environment:
      - DB_HOST=db
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
