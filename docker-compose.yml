services:
  db:
    image: postgres:17-alpine
    container_name: smart_task_db
    restart: always
    environment:
      - POSTGRES_USER=smart_user
      - POSTGRES_PASSWORD=smart_pass
      - POSTGRES_DB=smart_task_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_smart_task.sql:/docker-entrypoint-initdb.d/init_smart_task.sql
    ports:
      - "5433:5432"


  task_planner:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart-agent-activity-manager.git
      - AGENT_NAME=task_planner
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=9011
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "9011:9011"
    command: ["adk", "api_server", "./", "--port", "9011"]
    depends_on:
      - db

  coder_expert:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart-agent-quant-developer.git
      - AGENT_NAME=coder_expert
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=9012
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SMART_WORKSPACE_ROOT=/workspaces
    ports:
      - "9012:9012"
    command: ["adk", "api_server", "./", "--port", "9012"]
    depends_on:
      - db

  trader_expert:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart-agent-execution-trader.git
      - AGENT_NAME=trader_expert
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=9013
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "9013:9013"
    command: ["adk", "api_server", "./", "--port", "9013"]
    depends_on:
      - db

  research_expert:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart-agent-quant-researcher.git
      - AGENT_NAME=research_expert
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=9014
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "9014:9014"
    command: ["adk", "api_server", "./", "--port", "9014"]
    depends_on:
      - db

  risk_expert:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart-agent-risk-manager.git
      - AGENT_NAME=risk_expert
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=9015
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "9015:9015"
    command: ["adk", "api_server", "./", "--port", "9015"]
    depends_on:
      - db

  data_expert:
    build: 
      context: .
