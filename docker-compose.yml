services:
  smart_task_hub:
    build: 
      context: ./src
      dockerfile: Dockerfile
    container_name: smart_task_hub
    restart: always
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart_task.git
      - AGENT_NAME=smart_task_hub
      - POSTGRES_USER=smart_user
      - POSTGRES_PASSWORD=smart_pass
      - POSTGRES_DB=smart_task_hub
      - DB_HOST=127.0.0.1
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DB_URL=postgresql://smart_user:smart_pass@127.0.0.1:5432/smart_task_hub
      - ADK_A2A_SERVER_PORT=45666
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DOCKER_MANAGED_AGENTS=true
      - GIT_CONFIG_PARAMETERS='url.https://${GIT_AUTH_TOKEN}@github.com/.insteadOf=https://github.com/'
    ports:
      - "45666:45666"
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - .:/app
      - /app/.venv
    command: ["uv", "run", "python", "-m", "src.server"]

  hub_pm:
    build:
      context: ./hub
      dockerfile: Dockerfile
    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart_task.git
      - AGENT_NAME=hub_pm
      - DB_HOST=smart_task_hub
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - ADK_A2A_SERVER_PORT=9010
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GIT_CONFIG_PARAMETERS='url.https://${GIT_AUTH_TOKEN}@github.com/.insteadOf=https://github.com/'
    ports:
      - "9010:9010"
    volumes:
      - ./hub:/app
      - /app/.venv
    command: ["uv", "run", "adk", "api_server", "./", "--port", "9010", "--host", "0.0.0.0"]
    depends_on:
      - smart_task_hub

  task_planner:
