    environment:
      - GIT_AUTH_TOKEN=${GIT_AUTH_TOKEN}
      - GIT_REMOTE_URL=https://github.com/crossagent/smart-agent-data-engineer.git
      - AGENT_NAME=data_expert
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADK_A2A_SERVER_PORT=9016
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "9016:9016"
    command: ["adk", "api_server", "./", "--port", "9016"]
    depends_on:
