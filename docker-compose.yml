services:
  db:
    image: postgres:17-alpine
    container_name: smart_task_db
    restart: always
    environment:
      - POSTGRES_USER=smart_user
      - POSTGRES_PASSWORD=smart_pass
      - POSTGRES_DB=smart_task_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_smart_task.sql:/docker-entrypoint-initdb.d/init_smart_task.sql
    ports:
      - "5433:5432"

  smart_task_copilot:
    image: smart_task_copilot
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "45666:45666"
    container_name: smart_task_copilot
    depends_on:
      - db
    environment:
      - MCP_TRANSPORT=http
      - PORT=45666
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - SMART_WORKSPACE_ROOT=/workspaces
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
      - ALLOWED_HOSTS=*
      - UVICORN_TRUSTED_HOSTS=*
      - AGENT_BASE_PATH=/app
      - DOCKER_MANAGED_AGENTS=true
      - AGENT_ACTIVITY_MANAGER_HOST=activity_manager
      - AGENT_QUANT_DEVELOPER_HOST=quant_developer
      - AGENT_DATA_ENGINEER_HOST=data_engineer
      - AGENT_QUANT_RESEARCHER_HOST=quant_researcher
      - AGENT_RISK_MANAGER_HOST=risk_manager
      - AGENT_EXECUTION_TRADER_HOST=execution_trader
    volumes:
      - .:/app
      - /app/.venv
      - d:/MyProject:/workspaces 
    restart: on-failure

  activity_manager:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SESSION_SERVICE_URI=postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9011", "--a2a", "--host", "0.0.0.0", "--session_service_uri", "postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub?options=-csearch_path%3Dadk"]
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      - db
    ports:
      - "9011:9011"

  quant_developer:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SMART_WORKSPACE_ROOT=/workspaces
      - SESSION_SERVICE_URI=postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9012", "--a2a", "--host", "0.0.0.0", "--session_service_uri", "postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub?options=-csearch_path%3Dadk"]
    ports:
      - "9012:9012"
    volumes:
      - .:/app
      - /app/.venv
      - d:/MyProject:/workspaces
    depends_on:
      - db

  data_engineer:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9013", "--host", "0.0.0.0"]
    ports:
      - "9013:9013"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/data_engineer:/workspaces
    depends_on:
      - db

  quant_researcher:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9014", "--host", "0.0.0.0"]
    ports:
      - "9014:9014"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/researcher:/workspaces
    depends_on:
      - db

  risk_manager:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9015", "--host", "0.0.0.0"]
    ports:
      - "9015:9015"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/risk_manager:/workspaces
    depends_on:
      - db

  execution_trader:
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - AGENT_MCP_ENDPOINT=http://smart_task_copilot:45666/
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9016", "--host", "0.0.0.0"]
    ports:
      - "9016:9016"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/execution_trader:/workspaces
    depends_on:
      - db

volumes:
  postgres_data:
