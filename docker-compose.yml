      context: .
      dockerfile: ./Dockerfile
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=smart_task_hub
      - DB_USER=smart_user
      - DB_PASSWORD=smart_pass
      - DEPARTMENT_NAME=Data_Analyst
      - PYTHONPATH=.
    command: ["/app/.venv/bin/adk", "api_server", "smart_task_app/agents", "--port", "9016", "--host", "0.0.0.0", "--log_level", "INFO"]
    ports:
      - "9016:9016"
    volumes:
      - .:/app
      - /app/.venv
      - ./workspaces/analyst:/workspaces
    depends_on:
