# Smart Task Hub - Persistent Agent Pool Configuration

db_url: "postgresql://smart_user:smart_pass@db:5432/smart_task_hub"

# Environment mapping for dynamic interpolation (optional)
env:
  PROJECT_ROOT: "/app"
  WORKSPACE_ROOT: "/workspaces"

agents_pool:
  - id: "architect"
    resource_id: "RES-ARCHITECT-001"
    name: "Architect Agent"
    dir: "smart_task_app/agents/architect"
    port: 9001
    default_workspace: "/workspaces/smart_task" # Usually works on the main repo

  - id: "coder"
    resource_id: "RES-CODER-001"
    name: "Coder Agent"
    dir: "smart_task_app/agents/coder"
    port: 9002
    default_workspace: "/workspaces/smart_task"
