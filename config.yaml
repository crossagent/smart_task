# Smart Task Hub - Persistent Agent Pool Configuration

db_url: "postgresql+psycopg2://smart_user:smart_pass@db:5432/smart_task_hub"

# Environment mapping for dynamic interpolation
env:
  PROJECT_ROOT: "/app"
  WORKSPACE_ROOT: "/workspaces"

agents_pool:
  - id: "activity_manager"
    resource_id: "RES-ARCHITECT-001"
    name: "Activity Manager"
    dir: "smart_task_app/agents/activity_manager"
    host: "localhost"
    port: 9011
    default_workspace: "d:/MyProject/smart_task"

  - id: "quant_developer"
    resource_id: "RES-CODER-001"
    name: "Quant Developer"
    dir: "smart_task_app/agents/quant_developer"
    host: "localhost"
    port: 9012
    default_workspace: "d:/MyProject/smart_task"

  - id: "data_engineer"
    resource_id: "RES-ANALYST-001"
    name: "Data Engineer"
    dir: "smart_task_app/agents/data_engineer"
    host: "localhost"
    port: 9013
    default_workspace: "d:/MyProject/smart_task/workspaces/data_engineer"

  - id: "quant_researcher"
    resource_id: "RES-RESEARCHER-001"
    name: "Quant Researcher"
    dir: "smart_task_app/agents/quant_researcher"
    host: "localhost"
    port: 9014
    default_workspace: "d:/MyProject/smart_task/workspaces/researcher"

  - id: "risk_manager"
    resource_id: "RES-RISK-001"
    name: "Risk Manager"
    dir: "smart_task_app/agents/risk_manager"
    host: "localhost"
    port: 9015
    default_workspace: "d:/MyProject/smart_task/workspaces/risk_manager"

  - id: "execution_trader"
    resource_id: "RES-TRADER-001"
    name: "Execution Trader"
    dir: "smart_task_app/agents/execution_trader"
    host: "localhost"
    port: 9016
    default_workspace: "d:/MyProject/smart_task/workspaces/execution_trader"
